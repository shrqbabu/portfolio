
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Trainer</title>
<style>
*{
  font-family: 'Poppins', sans-serif;
  margin: 0;
  box-sizing: border-box;
}

body{
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
  padding: 10px;
}

.trainer-box{
  display: flex;
  background-color: white;
  max-width: 700px;
  width: 100%;
  border-radius: 15px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
  padding: 15px;
}

.profile-container{
  width: 230px;
}

.profile-container img{
  width: 210px;
  height: 210px;
  border-radius: 10%;
  object-fit: cover;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.name-box{
  display: flex;
  margin-top: 5px;
}

.name-h1{
  font-size: 15px;
  font-weight: 600;
}

.trainer-name{
  margin-left: 5px;
  font-weight: 500;
  font-size: 15px;
  color: green;
}

.about-container{
  flex: 1;
  margin-left: 20px;
}

.about-container h1{
  font-size: 20px;
  font-weight: 600;
}

.about-container p{
  font-size: 14px;
  margin: 8px 0 15px;
}

.all-tool-image{
  display: flex;
}

.all-tool-image img{
  height: 50px;
  width: 50px;
  border-radius: 50%;
  margin-right: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* =====================
   MOBILE RESPONSIVE
   ===================== */
@media screen and (max-width: 768px){

  .trainer-box{
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .profile-container{
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .profile-container img{
    width: 170px;
    height: 170px;
  }

  .name-box{
    justify-content: center;
  }

  .about-container{
    margin-left: 0;
    margin-top: 15px;
  }

  .about-container h1{
    font-size: 18px;
  }

  .all-tool-image{
    justify-content: center;
    flex-wrap: wrap;
  }

  .all-tool-image img{
    margin: 10px;
  }
}
</style>
</head>
<body>

   <div class="trainer-box"/>
   <div class="profile-container"/>
     <img src="https://shrqbabu.github.io/portfolio/image/krishna_pal.png" alt="0">
     <div class="name-box">
       <p class="name-h1">Name:</p>
   <p class="trainer-name">Krishna Pal</p>
     </div>
   </div>
<div class="about-container">
  <h1>About Us</h1>
  <p>Corporate Trainer & Admin | Data Analytics, AI, Power BI, MS Excel, Accounting & Tally | Professinal Coach | Leadership & Team Developemnt</p>
  <h1>Expert In</h1>
  <div class="all-tool-image">
    <img class="excel-image" src="https://shrqbabu.github.io/portfolio/image/excel.png" alt="Excel">
    <img src="https://shrqbabu.github.io/portfolio/image/powerbi.png" alt="Power Bi">
    <img src="https://shrqbabu.github.io/portfolio/image/tally.png" alt="Tally">
  </div>
</div>
</div>


</body>
</html>
